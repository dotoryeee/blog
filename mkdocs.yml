site_name: dotoryeee's blog
site_url: https://dotoryeee.github.io/blog/
site_description: 클라우드 인프라·SRE·쿠버네티스·DevOps를 맨땅에 헤딩하며 실습하고 정리한 기록

theme:
  name: material
  custom_dir: overrides
  language: ko
  logo: logo.svg
  font:
    text: Changa
  features:
    - content.code.copy
    - navigation.expand
    - navigation.top
    - navigation.footer
    - content.tabs.link
  palette:
    primary: deep orange

extra:
  homepage: https://dotoryeee.github.io
  social:
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/gardengarden/
    - icon: fontawesome/brands/github
      link: https://github.com/dotoryeee
  analytics:
    provider: google
    property: G-22LC2P5RV5

copyright: Copyright &copy; 2025 Jeongwon(Aaron) Lee

plugins:
  - blog:
      blog_dir: blog
      post_date_format: medium
      post_excerpt_separator: <!-- more -->
      # post_excerpt: required
      archive_date_format: yyyy MMMM
      post_readtime_words_per_minute: 150
      archive_url_date_format: yyyy/MM
      pagination_format: "$link_first $link_previous ~2~ $link_next $link_last"
      draft_on_serve: false
      draft: false
  - social:
      cards: true
      cards_layout_options:
        background_color: "#ff6e42"
        color: "#ffffff"
        font_family: Changa
  - rss:
      match_path: blog/posts/.*
      date_from_meta:
        as_creation: git
        as_update: git
      categories:
        - categories

markdown_extensions:
  - admonition
  - pymdownx.arithmatex
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.critic
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.details
  - pymdownx.inlinehilite
  - pymdownx.magiclink
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tasklist:
      custom_checkbox: true
  - attr_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
